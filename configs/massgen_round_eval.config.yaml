# uv run massgen --config .massgen/config_svg_round_evaluator.yaml "Create an SVG demonstrating Fourier decomposition of a complex periodic wave. Left third: A complex waveform (sum of at least 7 sine waves with different frequencies and amplitudes) plotted on an x-y axis spanning two full periods. The wave should have interesting features (sharp peaks, flat regions) showing it's not a simple sine. Middle third: Show the decomposition process with 7 individual sine wave components stacked vertically, each on its own mini-axis. Each component should be labeled with its frequency (f, 2f, 3f, etc.) and amplitude coefficient. Draw faint connection lines from each component to where it contributes to the complex wave. Right third: Bottom section shows the magnitude spectrum as a bar chart (frequency on x-axis, magnitude on y-axis) with 7 bars corresponding to the components. The top section shows the phase spectrum as circular indicators (small circles with a radius line showing phase angle). Include the Fourier series formula. Add smooth CSS animation that oscillates all waves in sync at their respective frequencies so the decomposition is visually verifiable. Scientific visualization style with a light grid background. 1400x800 viewBox. Every time you have a new answer, save the svg file to your workspace."
### One agent builds, 3 agents evaluate
agents:
  - id: agent_a
    backend:
      # type: gemini
      # model: gemini-3-flash-preview
      # model: gemini-3.1-pro-preview
      # model: gemini-3.1-flash-lite-preview
      # model: gemini-3.1-pro-preview-customtools  # supposedly better with custom tools?
      # type: claude_code
      # # model: claude-opus-4-6
      # model: claude-sonnet-4-6
      # reasoning:
      #   type: disabled
      type: codex
      model: gpt-5.4
      reasoning:
        effort: medium
      cwd: workspace
      enable_code_based_tools: true
      exclude_file_operation_mcps: true
      enable_mcp_command_line: true
      command_line_execution_mode: docker
      command_line_docker_image: massgen/mcp-runtime-sudo:latest
      command_line_docker_network_mode: bridge
      command_line_docker_enable_sudo: true
      command_line_docker_credentials:
        env_file: .env
        env_vars_from_file:
          - OPENAI_API_KEY
          - ANTHROPIC_API_KEY
          - GOOGLE_API_KEY
          - GEMINI_API_KEY
          - OPENROUTER_API_KEY
          - ELEVENLABS_API_KEY
          - XAI_API_KEY
        mount:
          - claude_config
          - codex_config
      shared_tools_directory: shared_tools
      auto_discover_custom_tools: true
      exclude_custom_tools:
        - _computer_use
        - _claude_computer_use
        - _gemini_computer_use
        - _browser_automation

orchestrator:
  snapshot_storage: snapshots
  agent_temporary_workspace: temp_workspaces
  max_new_answers_per_agent: 3
  skip_final_presentation: true
  enable_multimodal_tools: true
  image_generation_backend: openai
  video_generation_backend: openai
  voting_sensitivity: checklist_gated
  voting_threshold: 2
  coordination:
    evaluation_criteria_generator:
      enabled: true
    pre_collab_voting_threshold: 3
    max_orchestration_restarts: 0
    use_skills: true
    skills_directory: .agent/skills
    enable_agent_task_planning: true
    task_planning_filesystem_mode: true
    enable_memory_filesystem_mode: true
    learning_capture_mode: verification_and_final_only
    enable_changedoc: true
    write_mode: auto
    enable_subagents: true
    subagent_default_timeout: 1800
    subagent_max_concurrent: 3
    round_evaluator_before_checklist: true
    round_evaluator_skip_synthesis: false
    round_evaluator_refine: false  # refine=true is best since it will synthesize all the results from each agent in a smart way. if we want to do massgen rounds or just synthesize after first round. but honestly, this is likely not ready for `true`. e.g., we might have the case where they just vote after 1 round on one of the agents but the goal is for all to be incorporated. It is in this sense I think for now it's just better to do one round of generation then have one of them synthesize? May be wrong here actually. but this is just longer not sure if this is ready, needs A/B testing.
    orchestrator_managed_round_evaluator: true
    subagent_types: [round_evaluator, builder]  # no builder for now, it is harder
    subagent_orchestrator:
      enabled: true
      max_new_answers: 3  # evaluator agents iterate up to 3 rounds
      # Only round_evaluator uses the shared 3-agent child team by default.
      # builder and other subagent types stay on the spawning parent's backend
      # unless you opt them into the shared pool here.
      shared_child_team_types: [round_evaluator]
      # shared_child_team_types: [round_evaluator, builder]
      # shared_child_team_types: ["*"]
      # Child multi-agent quick runs default to final_answer_strategy: synthesize
      # when refine=False, so we intentionally do not set it here.
      # unless `round_evaluator_refine: true`
      agents:
        - id: eval_a
          backend:
            type: codex
            model: gpt-5.4
            reasoning:
              effort: medium
            cwd: workspace
            enable_code_based_tools: true
            exclude_file_operation_mcps: true
            enable_mcp_command_line: true
            command_line_execution_mode: docker
            command_line_docker_image: massgen/mcp-runtime-sudo:latest
            command_line_docker_network_mode: bridge
            command_line_docker_enable_sudo: true
            command_line_docker_credentials:
              env_file: .env
              env_vars_from_file:
                - OPENAI_API_KEY
                - ANTHROPIC_API_KEY
                - GOOGLE_API_KEY
                - GEMINI_API_KEY
                - OPENROUTER_API_KEY
                - ELEVENLABS_API_KEY
                - XAI_API_KEY
              mount:
                - claude_config
                - codex_config
            shared_tools_directory: shared_tools
            auto_discover_custom_tools: true
            exclude_custom_tools:
              - _computer_use
              - _claude_computer_use
              - _gemini_computer_use
              - _browser_automation
        - id: eval_b
          backend:
            type: claude_code
            model: claude-sonnet-4-6
            reasoning:
              type: disabled
            cwd: workspace
            enable_code_based_tools: true
            exclude_file_operation_mcps: true
            enable_mcp_command_line: true
            command_line_execution_mode: docker
            command_line_docker_image: massgen/mcp-runtime-sudo:latest
            command_line_docker_network_mode: bridge
            command_line_docker_enable_sudo: true
            command_line_docker_credentials:
              env_file: .env
              env_vars_from_file:
                - OPENAI_API_KEY
                - ANTHROPIC_API_KEY
                - GOOGLE_API_KEY
                - GEMINI_API_KEY
                - OPENROUTER_API_KEY
                - ELEVENLABS_API_KEY
                - XAI_API_KEY
              mount:
                - claude_config
                - codex_config
            shared_tools_directory: shared_tools
            auto_discover_custom_tools: true
            exclude_custom_tools:
              - _computer_use
              - _claude_computer_use
              - _gemini_computer_use
              - _browser_automation
        - id: eval_c
          backend:
            type: gemini
            model: gemini-3.1-pro-preview
            cwd: workspace
            enable_code_based_tools: true
            exclude_file_operation_mcps: true
            enable_mcp_command_line: true
            command_line_execution_mode: docker
            command_line_docker_image: massgen/mcp-runtime-sudo:latest
            command_line_docker_network_mode: bridge
            command_line_docker_enable_sudo: true
            command_line_docker_credentials:
              env_file: .env
              env_vars_from_file:
                - OPENAI_API_KEY
                - ANTHROPIC_API_KEY
                - GOOGLE_API_KEY
                - GEMINI_API_KEY
                - OPENROUTER_API_KEY
                - ELEVENLABS_API_KEY
                - XAI_API_KEY
              mount:
                - claude_config
                - codex_config
            shared_tools_directory: shared_tools
            auto_discover_custom_tools: true
            exclude_custom_tools:
              - _computer_use
              - _claude_computer_use
              - _gemini_computer_use
              - _browser_automation
  context_paths: []

timeout_settings:
  orchestrator_timeout_seconds: 6000
  initial_round_timeout_seconds: 1800
  subsequent_round_timeout_seconds: 1800
  round_timeout_grace_seconds: 450

ui:
  display_type: textual_terminal
  logging_enabled: true
