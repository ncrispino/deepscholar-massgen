agents:
- id: agent_a
  system_message: |
    Always save the final related-works content to a file named `intro.md` in the current workspace.
  backend:
    type: openrouter
    model: minimax/minimax-m2.7
    # qwen/qwen3.5-35b-a3b:alibaba
    # type: gemini
    # model: gemini-3-flash-preview
    # type: groq
    # model: openai/gpt-oss-120b
    # reasoning_effort: high  # medium
    # model: gemini-3.1-pro-preview
    # type: openrouter
    # model: z-ai/glm-5
    # model: qwen/qwen3.5-397b-a17b
    # model: minimax/minimax-m2.5
    # type: claude_code
    # model: claude-sonnet-4-5
    # model: claude-opus-4-6
    # type: codex
    # model: gpt-5.3-codex-spark
    # # model: gpt-5.3-codex
    # reasoning:
    #   # effort: xhigh
    #   effort: medium
    #   summary: auto
    cwd: workspace
    enable_code_based_tools: false  # want to use the mcp provided directly instead of needing to discover
    exclude_file_operation_mcps: true
    enable_mcp_command_line: true
    mcp_servers:
    - name: deepscholar_agentic
      type: stdio
      command: python
      args:
      - scripts/mcp/agentic_tools_server.py
      - --tool-mode
      - arxiv # switch to arxiv or web to restrict tool family
    command_line_execution_mode: docker
    # command_line_docker_image: ghcr.io/massgen/mcp-runtime-sudo:latest
    command_line_docker_image: massgen/mcp-runtime-sudo:latest
    command_line_docker_network_mode: none  # block internet so mcp is used # bridge
    command_line_docker_enable_sudo: true
    command_line_docker_credentials:
      env_file: .env
      env_vars_from_file:
      - OPENAI_API_KEY
      - ANTHROPIC_API_KEY
      - GOOGLE_API_KEY
      - GEMINI_API_KEY
    shared_tools_directory: shared_tools
    auto_discover_custom_tools: true
    exclude_custom_tools:
    - _computer_use
    - _claude_computer_use
    - _gemini_computer_use
    - _browser_automation
